# Guru-Mitra — nginx reverse proxy.
# Serves Django static directly and proxies everything else to the gunicorn
# socket. HTTP-first; `certbot --nginx -d 16.112.66.154.sslip.io` adds the
# :443 server block + the HTTP->HTTPS redirect. TLS terminates here and the
# X-Forwarded-Proto header tells Django the request was HTTPS.

upstream gurumitra_app {
    server unix:/run/gurumitra/gunicorn.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name 16.112.66.154.sslip.io;

    access_log /var/log/nginx/gurumitra.access.log;
    error_log  /var/log/nginx/gurumitra.error.log warn;

    # Voice clips are uploaded for transcription — allow a generous body size.
    client_max_body_size 25m;
    charset utf-8;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Django-collected static assets (app.js / styles.css).
    location /static/ {
        alias /home/ubuntu/AsstTeacher/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://gurumitra_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Groq round-trips (transcription + generation) can take a few seconds.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
